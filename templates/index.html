<!DOCTYPE html>
<html>
<head>
    <title>🚗CO2 Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-400 flex items-center justify-center min-h-screen">

    <div class="bg-red-50 shadow-xl rounded-2xl p-8 w-full max-w-md">

        <h2 class="text-2xl font-bold text-center mb-6 text-gray-700">
            🚗CO2 Emission Prediction
        </h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input type="number" step="any" name="engine_size"
                placeholder="Engine Size"
                class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>

            <input type="number" name="cylinders"
                placeholder="Cylinders"
                class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>

            <input type="number" step="any" name="fuel_consumption_comb"
                placeholder="Fuel Consumption"
                class="w-full p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400"
                required>

            <button type="submit"
                class="w-full duration-300  hover:text-white bg-blue-500 hover:bg-black text-white font-bold py-3 rounded-lg transition">
                Predict 🚀
            </button>
        </form>

        <h3 class="text-center mt-6 text-lg font-semibold text-green-600">
            Predicted CO2: {{ result|default:"—" }}
        </h3>

        {% if error %}
            <p class="text-red-500 text-center font-bold mt-3">
                {{ error }}
            </p>
        {% endif %}

    </div>

</body>
</html>
